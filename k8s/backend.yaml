---
# Backend ConfigMap (环境变量)
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: qa-dashboard
data:
  DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/qa_dashboard"
  REDIS_URL: "redis://redis:6379"

---
# Backend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: qa-dashboard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: qa-dashboard-backend:latest
          imagePullPolicy: Never  # 使用本地镜像
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: backend-config
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10

---
# Backend Service
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: qa-dashboard
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
