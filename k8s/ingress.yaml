apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: qa-dashboard-ingress
  namespace: qa-dashboard
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - qa.local
      secretName: qa-local-tls
  rules:
    - host: qa.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: qa-dashboard-frontend
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: qa-dashboard-backend
                port:
                  number: 8000
